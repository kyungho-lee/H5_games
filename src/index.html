<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DAILY PROTOCOL — GRID PROTOCOL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');
  :root {
    --bg:      #08090d;
    --panel:   #0d0f18;
    --border:  #1a2040;
    --accent:  #00f5c8;
    --warn:    #ff4060;
    --dim:     #2a3060;
    --text:    #c8d4f0;
    --textdim: #4a5880;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden; user-select: none;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.18) 2px, rgba(0,0,0,.18) 4px);
    pointer-events: none; z-index: 999;
  }
  #wrapper {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100%; height: 100%; gap: 0;
  }
  #header {
    width: 100%; max-width: 820px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px 6px; border-bottom: 1px solid var(--border);
  }
  #header h1 {
    font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: clamp(14px, 2.5vw, 22px);
    letter-spacing: .25em; color: var(--accent);
    text-shadow: 0 0 18px rgba(0,245,200,.5);
  }
  #header h1 span { color: var(--textdim); font-weight: 300; }
  #daily-badge {
    font-size: 11px; letter-spacing: .1em;
    color: var(--accent); border: 1px solid var(--accent);
    padding: 2px 8px; border-radius: 2px;
  }
  #stats-bar {
    width: 100%; max-width: 820px;
    display: flex; gap: 24px; padding: 6px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--textdim);
  }
  #stats-bar span b { color: var(--text); }
  #diff-row {
    display: flex; gap: 8px; padding: 8px 0;
  }
  .diff-btn {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--textdim); font-family: inherit; font-size: 12px;
    letter-spacing: .1em; padding: 5px 16px; cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .diff-btn.active { border-color: var(--accent); color: var(--accent); }
  #canvas-wrap {
    flex: 1; width: 100%; max-width: 820px; position: relative; overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #msg-bar {
    height: 24px; line-height: 24px;
    font-size: 11px; letter-spacing: .08em;
    color: var(--textdim); text-align: center;
    width: 100%; max-width: 820px;
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(8,9,13,.92); z-index: 10; gap: 16px;
  }
  .overlay.hidden { display: none; }
  .ol-title {
    font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: clamp(22px, 4vw, 36px); letter-spacing: .3em;
    color: var(--accent); text-shadow: 0 0 20px rgba(0,245,200,.6);
  }
  .ol-sub { font-size: 12px; letter-spacing: .1em; color: var(--textdim); }
  .ol-score { font-size: 28px; color: var(--text); letter-spacing: .1em; }
  .ol-streak { font-size: 16px; color: var(--warn); letter-spacing: .05em; }
  .ol-share-box {
    background: var(--panel); border: 1px solid var(--border);
    padding: 12px 20px; font-size: 12px; white-space: pre;
    color: var(--textdim); max-width: 320px;
    line-height: 1.7; letter-spacing: .03em;
  }
  .btn-ol {
    background: transparent; border: 1px solid var(--accent);
    color: var(--accent); font-family: inherit; font-size: 13px;
    letter-spacing: .15em; padding: 8px 32px; cursor: pointer;
    transition: background .15s;
  }
  .btn-ol:hover { background: rgba(0,245,200,.08); }
  .btn-ol.secondary {
    border-color: var(--border); color: var(--textdim);
  }
  .btn-ol.secondary:hover { background: rgba(255,255,255,.04); }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  /* ── ENDLESS 유도 블링크 ─────────────────────────────────────── */
  @keyframes endlessGuide {
    0%   { border-color: var(--border); color: var(--textdim); box-shadow: none;                      transform: scale(1);    }
    35%  { border-color: var(--accent); color: var(--accent);  box-shadow: 0 0 14px rgba(0,245,200,.5); transform: scale(1.05); }
    55%  { border-color: var(--accent); color: var(--accent);  box-shadow: 0 0 14px rgba(0,245,200,.5); transform: scale(1.05); }
    100% { border-color: var(--border); color: var(--textdim); box-shadow: none;                      transform: scale(1);    }
  }
  .btn-ol.endless-guide {
    animation: endlessGuide 1.8s ease-in-out infinite;
  }

  /* ── Summary overlay: scrollable to accommodate leaderboard ── */
  #ol-summary {
    overflow-y: auto;
    padding: 20px 12px;
    justify-content: flex-start;
    gap: 12px;
  }

  /* ── Leaderboard panel ── */
  .lb-section {
    width: 100%; max-width: 340px;
    border: 1px solid var(--border);
    background: var(--panel);
    font-size: 11px; flex-shrink: 0;
  }
  .lb-section.hidden { display: none; }
  .lb-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 12px; border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: .12em; color: var(--accent);
  }
  .lb-meta { color: var(--textdim); font-size: 10px; letter-spacing: .03em; }
  .lb-body { max-height: 175px; overflow-y: auto; }
  .lb-loading { padding: 14px; text-align: center; color: var(--textdim); font-size: 11px; }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th {
    padding: 4px 8px; text-align: left;
    color: var(--textdim); font-size: 10px; font-weight: normal;
    border-bottom: 1px solid var(--border); letter-spacing: .04em;
  }
  .lb-table td {
    padding: 4px 8px; font-size: 11px; color: var(--text);
    border-bottom: 1px solid rgba(26,32,64,.4);
  }
  .lb-table tr.lb-me td { background: rgba(0,245,200,.07); color: var(--accent); }
  .lb-stats {
    padding: 6px 12px; border-top: 1px solid var(--border);
    color: var(--textdim); font-size: 10px; letter-spacing: .04em;
  }
  .lb-my-rank {
    padding: 5px 12px; background: rgba(0,245,200,.05);
    border-top: 1px solid rgba(0,245,200,.15);
    color: var(--accent); font-size: 10px; letter-spacing: .04em;
  }
  .lb-my-rank.hidden { display: none; }

  /* ── Ad-retry button ── */
  #ad-retry-row { display: flex; justify-content: center; }
  #ad-retry-row.hidden { display: none; }
  .btn-retry {
    background: rgba(255,160,30,.1); border: 1px solid #ff9020;
    color: #ffb050; font-family: inherit; font-size: 11px;
    letter-spacing: .1em; padding: 7px 22px; cursor: pointer;
    transition: background .15s;
  }
  .btn-retry:hover { background: rgba(255,160,30,.22); }
  .btn-retry:disabled { opacity: .35; cursor: not-allowed; }

  /* ── Ad Modal (독립 레이어, z-index:30 — result overlay 위) ── */
  #ad-modal {
    position: absolute; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: rgba(8,9,13,.98);
  }
  #ad-modal.hidden { display: none; }
  .ad-modal-box {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; max-width: 300px; text-align: center;
  }
  .ad-modal-title {
    font-family: 'Rajdhani', sans-serif; font-size: 16px;
    font-weight: 700; letter-spacing: .2em; color: var(--accent);
  }
  .ad-placeholder {
    width: 280px; height: 150px;
    border: 1px solid var(--border); background: var(--panel);
    display: flex; align-items: center; justify-content: center;
  }
  .ad-mock {
    display: flex; flex-direction: column; gap: 6px;
    color: var(--textdim); font-size: 12px;
  }
  .ad-status {
    font-size: 11px; color: var(--textdim);
    letter-spacing: .04em; min-height: 1.4em;
  }
  .ad-progress-wrap {
    width: 280px; height: 4px;
    background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .ad-progress-fill {
    height: 100%; background: var(--accent); width: 0%;
    transition: width .8s linear;
  }
  .btn-ad-cancel {
    background: transparent; border: 1px solid var(--border);
    color: var(--textdim); font-family: inherit; font-size: 11px;
    letter-spacing: .1em; padding: 5px 20px; cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-ad-cancel:hover:not(:disabled) { border-color: var(--warn); color: var(--warn); }
  .btn-ad-cancel:disabled { opacity: .3; cursor: not-allowed; }

  /* ── DEV BAR (URL ?dev 파라미터로 활성화) ── */
  #dev-bar {
    display: none;           /* JS에서 DEV 감지 시 flex로 전환 */
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 9999;
    background: rgba(30, 10, 0, 0.92);
    border-top: 1px solid #ff6020;
    padding: 6px 14px;
    gap: 10px;
    align-items: center;
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    color: #ff9050;
  }
  #dev-bar .dev-label {
    font-weight: bold;
    letter-spacing: .12em;
    color: #ff6020;
    margin-right: 4px;
  }
  #dev-bar button {
    background: rgba(255,96,32,.15);
    border: 1px solid #ff6020;
    color: #ff9050;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: .08em;
    padding: 3px 10px;
    cursor: pointer;
    border-radius: 3px;
    transition: background .15s;
  }
  #dev-bar button:hover { background: rgba(255,96,32,.35); }
  #dev-bar #dev-status { flex: 1; color: #a06040; font-size: 10px; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="header">
    <h1>SAME PUZZLE <span>— GRID PROTOCOL</span></h1>
    <span id="daily-badge">DAILY</span>
  </div>
  <div id="stats-bar">
    <span>🔥 STREAK <b id="sv-streak">0</b></span>
    <span>BEST <b id="sv-best">0</b></span>
    <span id="sv-date"></span>
  </div>
  <div id="diff-row">
    <button class="diff-btn" id="btn-easy"   onclick="setDiff('easy')">EASY</button>
    <button class="diff-btn" id="btn-normal" onclick="setDiff('normal')">NORMAL</button>
    <button class="diff-btn" id="btn-hard"   onclick="setDiff('hard')">HARD</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>

    <!-- START / LOCKED overlay -->
    <div class="overlay" id="ol-start">
      <div class="ol-title" id="ol-start-title">DAILY PROTOCOL</div>
      <div class="ol-sub"   id="ol-start-sub">One attempt · No undo · Same board worldwide</div>
      <div class="btn-row">
        <button class="btn-ol" id="btn-begin" onclick="beginPlay()">BEGIN</button>
        <button class="btn-ol secondary" id="btn-practice" onclick="beginPractice()" style="display:none">PRACTICE</button>
        <button class="btn-ol secondary" id="btn-endless-start" onclick="location.href='endless.html'">ENDLESS</button>
      </div>
    </div>

    <!-- SUMMARY overlay (shown after play ends) -->
    <div class="overlay hidden" id="ol-summary">
      <div class="ol-title" id="ol-result-title">COMPLETE</div>
      <div class="ol-score"  id="ol-score">0</div>
      <div class="ol-sub"    id="ol-moves-line"></div>
      <div class="ol-streak" id="ol-streak-line"></div>
      <div class="ol-share-box" id="ol-share-text"></div>

      <!-- GLOBAL RANKING — Firebase에서 비동기 로드 -->
      <div class="lb-section hidden" id="lb-section">
        <div class="lb-header">
          GLOBAL RANKING
          <span class="lb-meta" id="lb-meta"></span>
        </div>
        <div class="lb-body" id="lb-body">
          <div class="lb-loading">🔄 Loading rankings...</div>
        </div>
        <div class="lb-stats"    id="lb-stats"></div>
        <div class="lb-my-rank hidden" id="lb-my-rank"></div>
      </div>

      <!-- AD RETRY — ranked·미클리어·미사용 재도전권 있을 때만 표시 -->
      <div id="ad-retry-row" class="hidden">
        <button class="btn-retry" id="btn-ad-retry" onclick="openAdModal()">
          📺 광고 시청 후 재도전
        </button>
      </div>

      <div class="btn-row">
        <button class="btn-ol" onclick="copyShare()">📋 COPY</button>
        <button class="btn-ol secondary" onclick="beginPractice()">PRACTICE</button>
        <button class="btn-ol secondary" id="btn-endless-summary" onclick="location.href='endless.html'">ENDLESS</button>
      </div>
      <div class="ol-sub" id="ol-copied" style="color:var(--accent);opacity:0;transition:opacity .3s">Copied!</div>
    </div>

    <!-- AD MODAL — z-index:30, 광고 상태머신 전용 컨테이너 -->
    <div id="ad-modal" class="hidden">
      <div class="ad-modal-box">
        <div class="ad-modal-title">재도전 광고</div>
        <div class="ad-placeholder" id="ad-placeholder">
          <!-- GPT 보상형 광고 또는 Mock 광고가 여기 렌더됩니다 -->
          <div class="ad-mock" id="ad-mock-content">
            <div style="font-size:26px">📱</div>
            <div>광고 영역</div>
            <div style="font-size:9px;color:#444;margin-top:4px">
              HTTPS 호스팅 후 실제 광고 표시
            </div>
          </div>
        </div>
        <div class="ad-status" id="ad-status">광고 준비 중...</div>
        <div class="ad-progress-wrap">
          <div class="ad-progress-fill" id="ad-progress-fill"></div>
        </div>
        <button class="btn-ad-cancel" id="ad-cancel" onclick="cancelAd()">취소</button>
      </div>
    </div>
  </div>
  <div id="msg-bar"></div>
</div>

<!-- DEV BAR — ?dev 파라미터로 활성화, 프로덕션 빌드에서는 숨겨짐 -->
<div id="dev-bar">
  <span class="dev-label">⚙ DEV</span>
  <button onclick="devResetToday()">오늘 플레이 초기화</button>
  <button onclick="devResetAll()">전체 초기화</button>
  <span id="dev-status"></span>
</div>

<!-- Playgama Bridge SDK — static tag required by Playgama validator -->
<script src="https://bridge.playgama.com/v1/stable/playgama-bridge.js"></script>
<!-- Ad SDK wrappers (domain-checked dynamic load — skipped on file://) -->
<script src="crazygames.js"></script>   <!-- CrazyGames SDK (priority) -->
<script src="playgama.js"></script>     <!-- Playgama Bridge wrapper -->
<!-- Firebase wrapper (SDK dynamically loaded by firebase.js after domain check) -->
<script src="firebase-config.js"></script>
<script src="firebase.js"></script>
<!-- Game engine -->
<script src="core.js"></script>
<script src="render.js"></script>
<script src="sound.js"></script>
<script>
'use strict';
const { DIFFICULTIES, scoreFormula, GameLogic, Renderer, DailyManager, LocalAdapter, SoundManager } = SG;

// ── DOM refs ──────────────────────────────────────────────────────
const canvas        = document.getElementById('gameCanvas');
const canvasWrap    = document.getElementById('canvas-wrap');
const msgBar        = document.getElementById('msg-bar');
const olStart       = document.getElementById('ol-start');
const olStartTitle  = document.getElementById('ol-start-title');
const olStartSub    = document.getElementById('ol-start-sub');
const btnBegin      = document.getElementById('btn-begin');
const btnPractice   = document.getElementById('btn-practice');
const olSummary     = document.getElementById('ol-summary');
const olResultTitle = document.getElementById('ol-result-title');
const olScore       = document.getElementById('ol-score');
const olMovesLine   = document.getElementById('ol-moves-line');
const olStreakLine  = document.getElementById('ol-streak-line');
const olShareText   = document.getElementById('ol-share-text');
const olCopied      = document.getElementById('ol-copied');
const svStreak      = document.getElementById('sv-streak');
const svBest        = document.getElementById('sv-best');
const svDate        = document.getElementById('sv-date');
// Leaderboard refs
const lbSection     = document.getElementById('lb-section');
const lbMeta        = document.getElementById('lb-meta');
const lbBody        = document.getElementById('lb-body');
const lbStats       = document.getElementById('lb-stats');
const lbMyRank      = document.getElementById('lb-my-rank');
// Ad refs
const adRetryRow    = document.getElementById('ad-retry-row');
const adModal       = document.getElementById('ad-modal');

// ── State ─────────────────────────────────────────────────────────
let renderer    = null;
let logic       = null;
let sound       = null;
let dailyMgr    = null;
let currentDiff = localStorage.getItem('sg_daily_lastdiff') || 'easy';
let isRanked    = false;
let gameActive  = false;
let lastTime    = 0;
let trail       = [];   // [{r, c, t, n}]
let lastRun     = null;
let comboCount  = 0;    // 연속 대형 그룹 제거 수 (사운드용)

const COMBO_MIN_SIZE = 5; // 콤보 체인 유지 최소 그룹 크기

// ── Boot ──────────────────────────────────────────────────────────
function init() {
  dailyMgr = new DailyManager(new LocalAdapter(localStorage), localStorage);
  renderer  = new Renderer(canvas);
  sound     = new SoundManager();
  resizeCanvas();
  applyDiffUI();
  refreshStats();
  showStartOverlay();
  requestAnimationFrame(loop);
  canvas.addEventListener('click',      onCanvasClick);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  window.addEventListener('resize',     resizeCanvas);

  // CrazyGames 요구사항: Space / 방향키 기본 스크롤 방지
  window.addEventListener('keydown', function(e) {
    if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
      e.preventDefault();
    }
  });
}

// ── Dev Mode ──────────────────────────────────────────────────────
// URL에 ?dev 파라미터가 있을 때만 노출 (예: daily.html?dev)
const DEV = new URLSearchParams(location.search).has('dev');
if (DEV) {
  document.getElementById('dev-bar').style.display = 'flex';
}

function devStatus(msg) {
  const el = document.getElementById('dev-status');
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 2500);
}

// 오늘 플레이 기록만 삭제 → 재플레이 허용 (streak·best 유지)
function devResetToday() {
  const today = dailyMgr.todayKey();
  let removed = 0;
  ['easy','normal','hard'].forEach(d => {
    const resultKey = 'sg_daily_result_' + today + '_' + d;
    if (localStorage.getItem(resultKey) !== null) {
      localStorage.removeItem(resultKey);
      removed++;
    }
  });
  refreshStats();
  showStartOverlay();
  devStatus('오늘 기록 삭제 (' + today + ', ' + removed + '개 난이도)');
}

// 전체 초기화 (streak·best·history 포함)
function devResetAll() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith('sg_daily_'));
  keys.forEach(k => localStorage.removeItem(k));
  refreshStats();
  showStartOverlay();
  devStatus('전체 삭제 (' + keys.length + '개 키)');
}

function resizeCanvas() {
  if (!renderer || !logic) {
    renderer && renderer.resize(canvasWrap.offsetWidth, canvasWrap.offsetHeight, 15, 12);
    return;
  }
  renderer.resize(canvasWrap.offsetWidth, canvasWrap.offsetHeight, logic.cfg.cols, logic.cfg.rows);
}

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (renderer && logic) {
    renderer.update(dt, logic.board, logic.cfg.cols, logic.cfg.rows);
    renderer.draw(logic.board, logic.cfg.cols, logic.cfg.rows);
  }
  requestAnimationFrame(loop);
}

// ── Difficulty ────────────────────────────────────────────────────
function setDiff(d) {
  currentDiff = d;
  localStorage.setItem('sg_daily_lastdiff', d);
  applyDiffUI();
  refreshStats();
  showStartOverlay();
}

function applyDiffUI() {
  ['easy','normal','hard'].forEach(d => {
    document.getElementById('btn-' + d).classList.toggle('active', d === currentDiff);
  });
}

function refreshStats() {
  const stats = dailyMgr.getStats(currentDiff);
  svStreak.textContent = stats.streak;
  svBest.textContent   = stats.best.toLocaleString();
  svDate.textContent   = dailyMgr.todayKey();
}

// ── Overlay helpers ───────────────────────────────────────────────
function showStartOverlay() {
  olSummary.classList.add('hidden');
  olStart.classList.remove('hidden');
  const played = dailyMgr.isPlayedToday(currentDiff);
  // 어떤 난이도라도 오늘 플레이됐으면 ENDLESS 유도
  const anyPlayed = ['easy', 'normal', 'hard'].some(d => dailyMgr.isPlayedToday(d));
  if (played) {
    olStartTitle.textContent  = 'ALREADY PLAYED';
    olStartSub.textContent    = "Today's board is locked — try Endless Mode!";
    btnBegin.style.display    = 'none';
    btnPractice.style.display = '';
  } else {
    olStartTitle.textContent  = 'DAILY PROTOCOL';
    olStartSub.textContent    = 'One attempt · No undo · Same board worldwide';
    btnBegin.style.display    = '';
    btnPractice.style.display = 'none';
  }
  // ENDLESS 버튼 블링크 유도 (오늘 플레이 완료 시)
  const btnES = document.getElementById('btn-endless-start');
  if (btnES) {
    btnES.classList.toggle('endless-guide', anyPlayed);
    btnES.textContent = anyPlayed ? 'ENDLESS ↗' : 'ENDLESS';
  }
  // 유휴 화면 — 배너 광고 표시
  SG.CG.showBanner();
}

function showSummary(run) {
  const stats = dailyMgr.getStats(currentDiff);
  olStart.classList.add('hidden');
  olSummary.classList.remove('hidden');
  olResultTitle.textContent = run.cleared ? 'CLEARED!' : 'GAME OVER';
  olScore.textContent       = run.score.toLocaleString();
  olMovesLine.textContent   = run.moves + ' moves';
  olStreakLine.textContent   = '🔥 Streak: ' + stats.streak + (run.cleared ? '  🎉' : '');
  olShareText.textContent   = dailyMgr.buildShareString(currentDiff, run);
  lastRun = run;
  refreshStats();

  // 리더보드 패널 초기 상태 리셋
  lbSection.classList.add('hidden');
  lbBody.innerHTML = '<div class="lb-loading">🔄 Loading rankings...</div>';
  lbStats.textContent = '';
  lbMyRank.classList.add('hidden');

  // 광고 재도전 버튼 가시성
  adRetryRow.classList.toggle('hidden', !canRetry());
  const btnAdRetry = document.getElementById('btn-ad-retry');
  if (btnAdRetry) { btnAdRetry.disabled = false; btnAdRetry.textContent = '📺 광고 시청 후 재도전'; }

  // 결과 화면 ENDLESS 버튼 — 게임 완료 직후 항상 블링크로 유도
  const btnES2 = document.getElementById('btn-endless-summary');
  if (btnES2) {
    btnES2.classList.add('endless-guide');
    btnES2.textContent = 'ENDLESS ↗';
  }
  // 유휴 화면 — 배너 광고 표시
  SG.CG.showBanner();
}

// ── Play flow ─────────────────────────────────────────────────────
function beginPlay() {
  isRanked = true;
  trail    = [];
  startBoard();
}

function beginPractice() {
  isRanked = false;
  trail    = [];
  startBoard();
}

function startBoard() {
  logic      = dailyMgr.makeGame(currentDiff);
  comboCount = 0;
  resizeCanvas();
  renderer.hintCells  = [];
  renderer.hoverGroup = [];
  gameActive = true;
  olStart.classList.add('hidden');
  olSummary.classList.add('hidden');
  msgBar.textContent = isRanked ? 'RANKED · no undo' : 'PRACTICE · unranked';

  // 데일리 모드: 게임 플레이 중에도 배너 유지 (짧은 단판 형식)
  SG.CG.showBanner();
  // CrazyGames: 게임플레이 시작 알림
  SG.CG.gameplayStart();
}

async function endGame(cleared) {
  // CrazyGames: 게임플레이 종료 알림
  SG.CG.gameplayStop();

  gameActive  = false;
  comboCount  = 0;
  renderer.hintCells  = [];
  renderer.hoverGroup = [];
  const run = { score: logic.score, moves: logic.moveCount, cleared, trail };
  if (isRanked) {
    // recordResult 내부에서 첫 플레이 vs 재도전을 구분해 처리
    // (재도전: 최고점일 때만 갱신, streak 중복 증가 없음)
    dailyMgr.recordResult(currentDiff, run);
    // Playgama Bridge storage: best scores 저장 (cross-device persistence)
    // recordResult() 직후 호출 → localStorage가 최신 상태임을 보장
    if (SG.PG && SG.PG.isAvailable()) {
      var _pgSave = {};
      ['easy', 'normal', 'hard'].forEach(function (d) {
        var _b = localStorage.getItem('sg_daily_best_' + d);
        if (_b) _pgSave['sg_daily_best_' + d] = parseInt(_b) || 0;
      });
      if (Object.keys(_pgSave).length > 0) {
        SG.PG.storageSet(_pgSave).catch(function () {});
      }
    }
  }

  // Playgama best practice: 게임 종료 시 인터스티셜 (논리적 정지 지점)
  await SG.CG.requestMidgameAd();

  showSummary(run);

  // 랭킹 표시: Firebase 연결 시 실제 데이터, 미연결 시 더미 미리보기
  if (isRanked) {
    lbSection.classList.remove('hidden');
    if (SG.FB && SG.FB.isConnected()) {
      submitToFirebase(run);                   // 실제 Firestore (HTTPS)
    } else {
      renderLeaderboard(makeDummyResult(run)); // 더미 (file:// 또는 미설정)
    }
  }
}

// ── Input ─────────────────────────────────────────────────────────
function onCanvasClick(e) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  handleClick((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
}

function onTouchStart(e) {
  e.preventDefault();
  const t     = e.touches[0];
  const rect  = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  handleClick((t.clientX - rect.left) * scaleX, (t.clientY - rect.top) * scaleY);
}

function handleClick(px, py) {
  if (!gameActive || !logic || !renderer) return;
  const { r, c } = renderer.cellFromPointer(px, py);
  if (r < 0 || r >= logic.cfg.rows || c < 0 || c >= logic.cfg.cols) return;

  // peek color BEFORE applyInput removes the tile (for animation)
  const colorBeforeRemove = (logic.board[r] && logic.board[r][c] !== undefined && logic.board[r][c] !== -1)
    ? logic.board[r][c]
    : 0;

  const result = logic.applyInput(r, c);
  if (!result.valid) {
    msgBar.textContent = 'Group too small (min ' + logic.cfg.minGroup + ')';
    return;
  }

  const groupSize = result.group.length;

  // record trail entry
  trail.push({ r, c, t: Date.now(), n: groupSize });

  renderer.spawnRemoveAnim(result.group, colorBeforeRemove);
  renderer.triggerShake();
  sound.playRemove(groupSize);

  // 콤보 판정 (5개 이상 연속 → 콤보 체인)
  if (groupSize >= COMBO_MIN_SIZE) {
    comboCount++;
  } else {
    comboCount = 0;
  }
  if (comboCount >= 2) sound.playCombo(comboCount);

  msgBar.textContent = '+' + result.gained + '  (' + groupSize + ' tiles)'
    + (comboCount >= 2 ? '  ×' + comboCount + ' COMBO' : '');

  for (const ev of result.events) {
    if (ev.type === 'BOARD_CLEAR') { sound.playClear();    endGame(true);  return; }
    if (ev.type === 'GAME_OVER')   { sound.playGameOver(); endGame(false); return; }
  }
}

// ── 국기 이모지 (Firebase 없이도 동작하는 로컬 버전) ─────────────
function countryFlag(code) {
  if (!code || code.length !== 2) return '🌐';
  const o = 127397;
  const u = code.toUpperCase();
  return String.fromCodePoint(u.charCodeAt(0) + o, u.charCodeAt(1) + o);
}

// ── 더미 랭킹 데이터 (Firebase 미연결 시 미리보기용) ──────────────
// 오늘 날짜 + 난이도를 시드로 사용해 새로고침해도 동일한 더미 생성
function makeDummyResult(run) {
  const rng = SG.seededRandom(SG.dateSeed(dailyMgr.todayKey(), currentDiff));
  // 재현 가능한 고유 플레이어 ID (로컬 세션용)
  const myId = 'DEMO_' + (0x1000 + Math.floor(rng() * 0xEFFF)).toString(16).toUpperCase();

  const FAKES = [
    { cc: 'US', city: 'New York'  }, { cc: 'JP', city: 'Tokyo'     },
    { cc: 'DE', city: 'Berlin'    }, { cc: 'GB', city: 'London'    },
    { cc: 'BR', city: 'São Paulo' }, { cc: 'FR', city: 'Paris'     },
    { cc: 'AU', city: 'Sydney'    }, { cc: 'CA', city: 'Toronto'   },
    { cc: 'CN', city: 'Shanghai'  }, { cc: 'IN', city: 'Mumbai'    },
  ];

  const fakeEntries = FAKES.map((reg, i) => {
    // 점수를 내 점수 기준으로 ±40% 범위에서 분산 → 상위권에 높은 점수 배치
    const spread  = Math.floor(rng() * run.score * 0.4);
    const bias    = (FAKES.length - i) * Math.max(80, Math.floor(run.score * 0.06));
    const score   = Math.max(100, run.score + bias - spread);
    const moves   = Math.max(3,  Math.round(run.moves * (0.6 + rng() * 0.8)));
    return {
      playerId: 'FAKE_' + i,
      score, moves,
      cleared: rng() > 0.45,
      countryCode: reg.cc,
      city: reg.city,
    };
  });

  const myEntry = {
    playerId: myId, score: run.score, moves: run.moves,
    cleared: run.cleared, countryCode: 'KR', city: 'Local',
  };

  const all    = [...fakeEntries, myEntry].sort((a, b) => b.score - a.score);
  const top    = all.slice(0, 10);
  const total  = 10 + Math.floor(rng() * 45 + 5);

  return {
    top, total,
    clearedCount: top.filter(e => e.cleared).length,
    playerId: myId,
    isDummy: true,        // ← 더미 모드 표시용
  };
}

// ── Firebase 실제 제출 ────────────────────────────────────────────
async function submitToFirebase(run) {
  // 글로벌 통계 갱신 (비필수 — 내부에서 실패 무시)
  SG.FB.updateGlobalStats(currentDiff, run.cleared);
  try {
    const today  = dailyMgr.todayKey();
    const result = await SG.FB.submitDailyScore({
      date:    today,
      diff:    currentDiff,
      score:   run.score,
      moves:   run.moves,
      cleared: run.cleared,
    });
    renderLeaderboard(result);
  } catch (e) {
    // Firebase 실패 (네트워크·CORS·규칙 오류 등) → 더미 데이터로 조용히 폴백
    console.warn('[SG] Firebase submission failed (fallback to demo):', e);
    renderLeaderboard(makeDummyResult(run));
  }
}

// ── 리더보드 렌더 (실제 + 더미 공통) ────────────────────────────
function renderLeaderboard(result) {
  // 헤더: 더미 모드 시 "(DEMO)" 표기
  lbMeta.textContent = result.total + ' players'
    + (result.isDummy ? '  ·  DEMO (Firebase not configured)' : '');

  // Top 표
  if (!result.top || result.top.length === 0) {
    lbBody.innerHTML = '<div class="lb-loading">🎉 First to play today!</div>';
  } else {
    const rows = result.top.map((entry, i) => {
      const flag   = countryFlag(entry.countryCode);  // 로컬 함수 사용
      const suffix = entry.playerId.slice(-4).toUpperCase();
      const isMe   = entry.playerId === result.playerId;
      const cls    = isMe ? ' class="lb-me"' : '';
      const loc    = entry.city
        ? flag + ' ' + entry.city
        : (entry.countryCode || flag);
      const clr    = entry.cleared ? '✓' : '✗';
      return `<tr${cls}>
        <td>#${i + 1}</td>
        <td>${isMe ? '<b>(me) </b>' : ''}${suffix}</td>
        <td>${entry.score.toLocaleString()}</td>
        <td>${entry.moves}</td>
        <td>${clr}</td>
        <td style="color:var(--textdim)">${loc}</td>
      </tr>`;
    }).join('');
    lbBody.innerHTML =
      '<table class="lb-table"><thead><tr>' +
      '<th>#</th><th>PLAYER</th><th>SCORE</th><th>MOVES</th><th>CLR</th><th>REGION</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';
  }

  // 클리어율 통계 (clearedCount 누락된 구버전 데이터 방어 처리)
  if (result.total > 0) {
    const cc   = typeof result.clearedCount === 'number' ? result.clearedCount : 0;
    const rate = Math.round(cc / result.total * 100);
    lbStats.textContent =
      'cleared ' + rate + '% · ' + cc + '/' + result.total + ' players';
  }

  // 내 순위
  const myIdx = (result.top || []).findIndex(e => e.playerId === result.playerId);
  if (myIdx >= 0) {
    lbMyRank.textContent = 'MY RANK: #' + (myIdx + 1) + ' / ' + result.total;
    lbMyRank.classList.remove('hidden');
  } else if (result.total > 20) {
    lbMyRank.textContent = 'MY RANK: outside Top 20 (' + result.total + ' players)';
    lbMyRank.classList.remove('hidden');
  }
}

// ── 광고 재도전 — 상태머신 ────────────────────────────────────────
// 상태: IDLE → LOADING → PLAYING → GRANTED | SKIPPED | FAILED
const AD = { IDLE:'idle', LOADING:'loading', PLAYING:'playing',
             GRANTED:'granted', SKIPPED:'skipped', FAILED:'failed' };
let _adState      = AD.IDLE;
let _adTimerHnd   = null;
let _adElapsed    = 0;
let _adDuration   = 0;

function canRetry() {
  if (!isRanked) return false;
  return !!(lastRun && !lastRun.cleared); // 실패한 경우 언제나 재도전 가능
}

// 버튼 클릭 진입점
async function openAdModal() {
  const btn = document.getElementById('btn-ad-retry');
  if (btn) btn.disabled = true;

  // ── CrazyGames 보상형 광고 (플랫폼이 UI 전체를 담당) ──────────
  if (SG.CG.isAvailable()) {
    const res = await SG.CG.requestRewardedAd();
    if (res.granted) {
      _grantRetry();
    } else {
      // 광고 취소 / 실패 → 버튼 복원
      if (btn) { btn.disabled = false; btn.textContent = '📺 광고 시청 후 재도전'; }
    }
    return;
  }

  // ── 폴백: 자체 모달 (AdSense GPT 또는 모의 광고) ──────────────
  adModal.classList.remove('hidden');
  _setAdState(AD.LOADING);

  if (window.googletag && window.googletag.apiReady &&
      window.SG_FIREBASE_CONFIG && window.SG_FIREBASE_CONFIG.gptAdUnit) {
    _triggerGptAd();
  } else {
    setTimeout(_startMockAd, 600);
  }
}

function _setAdState(state) {
  _adState = state;
  const statusEl   = document.getElementById('ad-status');
  const cancelBtn  = document.getElementById('ad-cancel');
  const fillEl     = document.getElementById('ad-progress-fill');
  if (!statusEl) return;

  switch (state) {
    case AD.LOADING:
      statusEl.textContent = '광고 로딩 중...';
      cancelBtn.disabled   = false; cancelBtn.textContent = '취소';
      if (fillEl) fillEl.style.width = '0%';
      break;
    case AD.PLAYING:
      statusEl.textContent = '광고 시청 중 — 끝까지 시청해주세요';
      cancelBtn.disabled   = true;
      break;
    case AD.GRANTED:
      statusEl.textContent = '✓ 완료! 재도전 시작...';
      cancelBtn.disabled   = true;
      if (fillEl) fillEl.style.width = '100%';
      break;
    case AD.SKIPPED:
      statusEl.textContent = '광고를 끝까지 시청해야 재도전이 가능합니다.';
      cancelBtn.disabled   = false; cancelBtn.textContent = '닫기';
      break;
    case AD.FAILED:
      statusEl.textContent = '❌ 광고 로드 실패. 잠시 후 다시 시도해주세요.';
      cancelBtn.disabled   = false; cancelBtn.textContent = '닫기';
      break;
  }
}

function cancelAd() {
  if (_adState === AD.PLAYING) return; // 재생 중 취소 불가
  if (_adTimerHnd) { clearInterval(_adTimerHnd); _adTimerHnd = null; }
  adModal.classList.add('hidden');
  _adState = AD.IDLE;
  const btn = document.getElementById('btn-ad-retry');
  if (btn) { btn.disabled = false; btn.textContent = '📺 광고 시청 후 재도전'; }
}

// 모의 광고 (dev: 5초 / 실제: 30초)
function _startMockAd() {
  _adDuration = DEV ? 5 : 30;
  _adElapsed  = 0;
  _setAdState(AD.PLAYING);
  const fillEl = document.getElementById('ad-progress-fill');

  _adTimerHnd = setInterval(() => {
    _adElapsed++;
    const pct = Math.min(100, Math.round(_adElapsed / _adDuration * 100));
    if (fillEl) fillEl.style.width = pct + '%';
    if (_adElapsed >= _adDuration) {
      clearInterval(_adTimerHnd); _adTimerHnd = null;
      _setAdState(AD.GRANTED);
      setTimeout(_grantRetry, 800);
    }
  }, 1000);
}

// 실제 GPT 보상형 광고 (HTTPS + AdSense 계정 필요)
function _triggerGptAd() {
  try {
    googletag.cmd.push(function () {
      const slot = googletag.defineOutOfPageSlot(
        window.SG_FIREBASE_CONFIG.gptAdUnit,
        googletag.enums.OutOfPageFormat.REWARDED
      ).addService(googletag.pubads());

      googletag.pubads().addEventListener('rewardedSlotReady',   () => { _setAdState(AD.PLAYING); });
      googletag.pubads().addEventListener('rewardedSlotGranted', () => { _setAdState(AD.GRANTED); setTimeout(_grantRetry, 800); });
      googletag.pubads().addEventListener('rewardedSlotClosed',  () => { if (_adState !== AD.GRANTED) _setAdState(AD.SKIPPED); });
      googletag.pubads().addEventListener('rewardedSlotFailed',  () => { _setAdState(AD.FAILED); });

      googletag.enableServices();
      googletag.display(slot);
    });
  } catch (e) {
    console.warn('[SG] GPT 실패, mock 폴백:', e);
    _startMockAd();
  }
}

// 보상 지급 → 즉시 새 게임 시작 (무제한)
function _grantRetry() {
  adModal.classList.add('hidden');
  _adState = AD.IDLE;
  isRanked = true;  // 재도전도 ranked (최고점 반영)
  trail    = [];
  startBoard();     // startBoard가 ol-summary를 숨김
}

// ── Share ─────────────────────────────────────────────────────────
function copyShare() {
  const text = olShareText.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(flashCopied, () => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  flashCopied();
}

function flashCopied() {
  olCopied.style.opacity = '1';
  setTimeout(() => { olCopied.style.opacity = '0'; }, 1500);
}

(async () => {
  // Playgama Bridge 정적 로드 감지 → CrazyGames SDK 대기 없이 즉시 init
  // (Playgama QA 검증기가 30초 이내 game_ready 수신 필요)
  if (window.bridge && typeof window.bridge.initialize === 'function') {
    await SG.PG.init();                            // Playgama Bridge 우선
  } else {
    await SG.CG.init();                            // CrazyGames SDK
    if (!SG.CG.isAvailable() && SG.PG) {
      await SG.PG.init();                          // 기타 플랫폼 폴백
    }
  }
  SG.CG.loadingStart();    // notify asset loading started
  init();                  // sync init (Canvas, overlay, RAF loop)
  SG.CG.loadingStop();     // notify loading complete / game_ready (Bridge: sendMessage)

  // Playgama 플랫폼 이벤트 — 오디오 상태 단일 핸들러
  // 광고(인터스티셜·리워드), 탭 전환, 시스템 pause 모두 커버
  if (SG.PG) {
    SG.PG._onAudioStateChanged = (isEnabled) => {
      if (sound) sound.setMuted(!isEnabled);
    };
  }

  // Playgama Bridge storage: 다른 기기 / 세션에서 저장된 daily best scores 복원
  // localStorage보다 높은 값이 있으면 덮어쓰고 UI를 갱신합니다.
  if (SG.PG && SG.PG.isAvailable()) {
    SG.PG.storageGet(['sg_daily_best_easy', 'sg_daily_best_normal', 'sg_daily_best_hard'])
      .then(function (data) {
        if (!data) return;
        var updated = false;
        ['easy', 'normal', 'hard'].forEach(function (d) {
          var pgBest = parseInt(data['sg_daily_best_' + d]) || 0;
          var lcBest = parseInt(localStorage.getItem('sg_daily_best_' + d)) || 0;
          if (pgBest > lcBest) {
            localStorage.setItem('sg_daily_best_' + d, pgBest);
            updated = true;
          }
        });
        if (updated) refreshStats();  // 갱신된 best score UI 반영
      })
      .catch(function () {});
  }
})();
</script>
